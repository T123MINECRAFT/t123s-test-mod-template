name: Publish Mod to GitHub Releases & Modrinth

on:
  push:
    tags:
      - '[0-9]+*'          # 匹配以数字开头的标签，如 0.1.0-alpha.1

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # 允许创建 GitHub Release

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Mod
        run: ./gradlew clean build

      - name: List built files
        run: ls -R build/libs/

      # 动态生成版本号字符串
      - name: Build version strings
        id: version_strings
        run: |
          TAG="${{ github.ref_name }}"
          MODRINTH_VERSION="${TAG}-fabric+1.21.1"
          FILE_VERSION="t123s_test_mod-${MODRINTH_VERSION}"
          echo "modrinth_version=${MODRINTH_VERSION}" >> $GITHUB_OUTPUT
          echo "file_version=${FILE_VERSION}" >> $GITHUB_OUTPUT

      # 发布到 GitHub 和 Modrinth
      - name: Publish to Platforms
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          files: build/libs/${{ steps.version_strings.outputs.file_version }}.jar

          # GitHub 配置
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') || contains(github.ref_name, 'pre') }}

          # Modrinth 配置
          modrinth-id: 5HrgYW5Z
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          # 版本元数据
          name: ${{ github.ref_name }}
          version: ${{ steps.version_strings.outputs.modrinth_version }}
          version-type: ${{ contains(github.ref_name, 'alpha') && 'alpha' || contains(github.ref_name, 'beta') && 'beta' || contains(github.ref_name, 'rc') && 'rc' || contains(github.ref_name, 'pre') && 'pre' || 'release' }}
          loaders: fabric
          game-versions: 1.21.1
          java: Java 21